version: '3.9'

services:
  web:
    build: .
    container_name: fasttask_webapp
    command: gunicorn --chdir server --bind 0.0.0.0:8000 config.wsgi:application && python manage.py collectstatic --noinput
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SECRET_KEY_FASTTASK=${DJANGO_SECRET_KEY}
    depends_on:
      - db

  db:
    image: mysql:8.4
    container_name: fasttask_db
    restart: always
    environment:
      MYSQL_DATABASE: ${FASTTASK_DATABASE}
      MYSQL_USER: ${FASTTASK_USER}
      MYSQL_PASSWORD: ${FASTTASK_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
    
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
    mysql_data: