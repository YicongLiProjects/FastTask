<!DOCTYPE html>
<html lang="en">
    <title>FastTask account</title>
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'img/fasttask_favicon.svg' %}">
    <link rel="stylesheet" href="{% static 'cssFiles/accountInfoPageStyle.css' %}">
    <script src="{% static 'jsFiles/accountInformation.js' %}" defer></script>
    <body>
        <h1>Welcome to your FastTask account</h1>
        {% csrf_token %}
        <div class="pfp">
            {% if request.user.profile.pfp %}
            <img class="pfp_image" id="pfpImage src="{{ request.user.profile.pfp.url }}">
            {% else %}
            <img class="pfp_image" id="pfpImage" src="{% static 'img/defaultuser.png' %}">
            {% endif %}
            <button class="pfp_upload_btn" id="pfpUploadBtn">Upload new image</button>
            <input type="file" id="pfpFileInput" accept=".jpg, .png, .jpeg" style="display: none;">
        </div>
        <div class="status_msg_section" role="alert" aria-live="polite" id="statusMsgSection">

        </div>
        <div class="user_info">
            <div>
                <label>First name</label>
                <input type="text" placeholder="Enter your first name" id="fnField" value="{{ request.user.first_name }}">
            </div>
            <div>
                <label>Last name</label>
                <input type="text" placeholder="Enter your last name" id="lnField" value="{{ request.user.last_name }}">
            </div>
            <div>
                <label>Date of birth</label>
                <input type="date" id="dobField" value="{{ request.user.profile.dob }}">
            </div>
            <div>
                <label>Email</label>
                <input type="email" placeholder="Enter new email email address" id="emailField" value="{{ request.user.email }}">
            </div>
            <div>
                <label>Username</label>
                <input type="text" placeholder="Enter new username" id="usernameField" value="{{ request.user.profile.display_name }}">
            </div>
            <div>
                <label>Password</label>
                <input type="password" placeholder="Enter new password" id="passwordField">
            </div>
        </div>
        <button class="submit_btn" id="submitChangesBtn">
            Save changes
        </button>
        <button class="submit_btn" id="cancelChangesBtn">
            Cancel
        </button>
    </body>
</html>
