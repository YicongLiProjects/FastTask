<!DOCTYPE html>
<html lang="en">
    <title>
        Sign in - FastTask
    </title>
    <link rel="stylesheet" href="../static/cssFiles/loginPageStyle.css">
    <link rel="icon" type="image/x-icon" href="../fasttask_favicon.svg">
    <script src="../static/jsFiles/login.js"></script>
    <body>
        <h1>
            Sign into your account
        </h1>
        <div class="signin_form">
            <div>
                <label>
                    Email
                </label>
                <input type="email" id="emailField" placeholder="Enter email"/>
            </div>
            <div>
                <label>
                    Password
                </label>
                <input type="password" id="passwordField" placeholder="Enter password">
            </div>
            <button class="signin_button" id="signInButton">
                Sign in
            </button>
        </div>
        <a href="../templates/signUpPage.html">Don't have an account yet? Create an account</a>
        <a href="../templates/passwordResetEmailPage.html">Forgot your password? Reset here</a>
    </body>
</html>
