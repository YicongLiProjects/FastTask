<!DOCTYPE html>
<html lang="en">
    <title>FastTask - your todo list app</title>
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'img/fasttask_favicon.svg' %}">
    <link rel="stylesheet" href="{% static 'cssFiles/appPageStyle.css' %}">
    <script src="{% static 'jsFiles/app.js' %}" defer></script>
    <body>
        {% csrf_token %}
        <div class="app_page_header">
            <h1 class="app_name">FastTask</h1>
            <div class="user_info_panel">
                <div class="user_data">
                    <h4>{{ request.user.profile.display_name }}</h4>
                    <h4 id="xpValue">{{ request.user.profile.xp }} XP</h4>
                    <h4 id="levelValue">Level {{ request.user.profile.level }}</h4>
                </div>
                <button class="pfp" id="pfpButton">
                    {% if request.user.profile.pfp %}
                    <img src="{{ request.user.profile.pfp.url }}">
                    {% else %}
                    <img src="{% static 'img/defaultuser.png'%}">
                    {% endif %}
                </button>
            </div>
        </div>
        <div class="tasks_list">
            <button class="add_button" id="addButton"><img src="{% static 'img/add.png' %}"></button>
            <div class="task_container" id="taskContainer">

            </div>
        </div>
        <!--Modal box used for adding and editing tasks-->
        <div class="task_modal_box" id="taskModalBox">
            <div class="modal_box_content">
                <div class="close_bar_modal_box">
                    <span class="close_btn">&times;</span>
                    <h2 id="modalTitle">Add new task</h2>
                </div>
                <div>
                    <label for="taskName">Task name</label>
                    <input type="text" id="taskName" name="taskName">
                </div>
                <div>
                    <label for="taskNotes">Notes</label>
                    <textarea type="text" id="taskNotes" name="taskNotes"></textarea>
                </div>
                <div>
                    <label for="taskEnd">End date and time</label>
                    <input type="datetime-local" id="taskEnd" name="taskEnd">
                </div>
                <div>
                    <label for="remindAt">Remind me at</label>
                    <input type="datetime-local" id="remindAt" name="remindAt">
                </div>
                <div>
                    <button class="save_task_btn" id="saveTaskBtn">Save task</button>
                    <button class="reset_btn" id="resetBtn">Reset</button>
                    <button class="delete_task_btn" id="deleteTaskBtn" disabled>Delete task</button>
                    <button class="task_completed_btn" id="taskCompletedBtn" disabled>Completed</button>
                </div>
            </div>
        </div>

        <!--Account settings when clicking the profile picture-->
        <div class="account_box" id="accountBox">
            <div class="account_box_content">
                <button id="helpBtn">Help</button>
                <button id="accountDetailsBtn">Account details</button>
                <button id="logoutBtn">Logout</button>
            </div>
        </div>
    </body>
</html>
